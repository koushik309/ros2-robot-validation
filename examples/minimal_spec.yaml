run:
  mode: sim
  duration_s: 30
robot:
  name: rrbot
  joints:
    - joint1
    - joint2
telemetry:
  record_rosbag: true
  topics:
    - /joint_states
    - /tf
    - /tf_static
    - /diagnostics
tests:
  - id: motion.repeatability
    params:
      waypoint: [0.2, 0.1, 0.3, 0, 1.57, 0]
      repeats: 5
    thresholds:
      position_rmse_m: 0.005